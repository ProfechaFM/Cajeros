<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cierre de caja — La Fiesta del Maíz</title>
<style>
  :root{
    --bg:#f3f1ea; --card:#fff; --ink:#26251f; --muted:#6b6a62;
    --line:#d9d6ca; --brand:#1d6e56; --brand-ink:#0f5040;
    --warn-bg:#faeeda; --warn-ink:#854f0b; --warn-line:#ef9f27;
    --danger-bg:#fcebeb; --danger-ink:#a32d2d; --danger-line:#e24b4a;
    --field:#fbfaf5; --r:12px;
    --c-efe:#1d6e56; --c-tar:#4c7fa3; --c-sin:#c9822b; --c-dol:#7a6a9b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:17px;line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:520px;margin:0 auto;padding:16px 16px 96px}
  .wrap.admin{max-width:1200px}
  header.app{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 2px 14px}
  header.app .title{font-weight:600;font-size:16px}
  header.app .who{font-size:13px;color:var(--muted);text-align:right}
  .prog{display:flex;gap:4px;margin:0 0 16px}
  .prog span{flex:1;height:5px;border-radius:3px;background:var(--line)}
  .prog span.on{background:var(--brand)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin:0 0 14px}
  h2.step{margin:0 0 4px;font-size:20px;font-weight:600}
  p.hint{margin:0 0 16px;color:var(--muted);font-size:14px}
  label.fld{display:block;margin:0 0 14px}
  label.fld span{display:block;font-size:14px;color:var(--muted);margin:0 0 5px}
  input,select,textarea{width:100%;font-size:18px;padding:13px 12px;border:1px solid var(--line);border-radius:10px;background:var(--field);color:var(--ink);font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--brand);border-color:var(--brand)}
  input[inputmode="numeric"],input[inputmode="decimal"]{text-align:right;font-variant-numeric:tabular-nums}
  input.left{text-align:left}
  textarea{min-height:70px;resize:vertical;text-align:left;font-size:16px}
  .denom-row{display:grid;grid-template-columns:100px 1fr auto;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
  .denom-row:last-child{border-bottom:0}
  .denom-row .dn{font-weight:500;font-variant-numeric:tabular-nums}
  .denom-row input{padding:9px 10px;font-size:16px}
  .denom-row .tot{text-align:right;color:var(--muted);font-size:13px;min-width:64px}
  .subhead{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 6px}
  .navbar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);padding:10px 16px;display:flex;gap:10px;max-width:520px;margin:0 auto}
  button{font-family:inherit;font-size:17px;font-weight:500;padding:14px 16px;border-radius:10px;border:1px solid transparent;cursor:pointer}
  .btn-primary{flex:2;background:var(--brand);color:#fff}
  .btn-ghost{flex:1;background:transparent;border-color:var(--line);color:var(--ink)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .review .rr{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
  .review .rr:last-child{border-bottom:0}
  .review .rr b{font-weight:500;font-variant-numeric:tabular-nums}
  .review .rr .k{color:var(--muted)}
  .note{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn-ink);border-radius:10px;padding:12px 14px;font-size:14px;margin:0 0 14px}
  .locked{background:#f1efe8;color:var(--muted)}
  .err{color:var(--danger-ink);font-size:14px;margin:0 0 12px}
  .link{background:none;border:0;color:var(--brand);text-decoration:underline;font-size:14px;padding:8px;cursor:pointer;width:100%}
  .spin{text-align:center;color:var(--muted);padding:40px 0}
  /* comprobante */
  .cbte{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px}
  .cbte h3{margin:0 0 2px;font-size:17px;font-weight:600;text-align:center}
  .cbte .sub{text-align:center;color:var(--muted);font-size:13px;margin:0 0 12px}
  .cbte .meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;font-size:13px;margin:0 0 12px}
  .cbte .meta div{display:flex;justify-content:space-between;border-bottom:1px dotted var(--line);padding:3px 0}
  .cbte .meta .k{color:var(--muted)}
  .cbte table{width:100%;border-collapse:collapse;font-size:13px;margin:4px 0 10px}
  .cbte caption{text-align:left;font-weight:600;font-size:13px;padding:6px 0 4px;text-transform:uppercase;letter-spacing:.03em}
  .cbte th,.cbte td{border:1px solid var(--line);padding:5px 7px;text-align:right;font-variant-numeric:tabular-nums}
  .cbte th{background:#f1efe8;font-weight:500;color:var(--muted)}
  .cbte td.den{text-align:left}
  .cbte tr.low td{background:var(--warn-bg)}
  .cbte tfoot td{font-weight:600;background:#f1efe8}
  .cbte .big{font-size:19px;font-weight:600;text-align:center;padding:10px;border:1px solid var(--brand);border-radius:8px;margin:4px 0 12px;color:var(--brand-ink)}
  .cbte .alert{background:var(--danger-bg);border:1px solid var(--danger-line);color:var(--danger-ink);border-radius:8px;padding:12px;text-align:center;font-weight:600;margin:0 0 12px}
  .cbte .notas{font-size:13px;color:var(--muted);border-top:1px dotted var(--line);padding-top:8px}
  /* admin */
  .tabs{display:flex;gap:6px;margin:0 0 14px;flex-wrap:wrap}
  .tabs button{font-size:15px;padding:9px 14px;background:var(--card);border:1px solid var(--line);color:var(--muted);flex:none}
  .tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .toolbar{display:flex;gap:8px;align-items:end;flex-wrap:wrap;margin:0 0 14px}
  .toolbar label{font-size:13px;color:var(--muted)}
  .toolbar input,.toolbar select{font-size:15px;padding:9px 10px;width:auto}
  .toolbar button{font-size:15px;padding:10px 14px;flex:none;background:var(--brand);color:#fff}
  .xls{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:var(--r)}
  table.grid{border-collapse:collapse;width:100%;font-size:13px;font-family:Arial,sans-serif}
  table.grid th,table.grid td{border:1px solid var(--line);padding:5px 8px;white-space:nowrap;font-variant-numeric:tabular-nums;text-align:right}
  table.grid th{background:#e8efe9;font-weight:600;color:var(--brand-ink);position:sticky;top:0;text-align:center}
  table.grid td.txt{text-align:left}
  table.grid tr.pend td{background:var(--danger-bg)}
  table.grid td.neg{color:var(--danger-ink);font-weight:600}
  table.grid td.pos{color:var(--brand-ink);font-weight:600}
  table.grid tr:nth-child(even) td{background:#fbfaf5}
  table.grid tr.pend:nth-child(even) td{background:var(--danger-bg)}
  .kpis{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}  .kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;flex:1;min-width:130px}
  .kpi .k{font-size:12px;color:var(--muted)}
  .kpi .v{font-size:19px;font-weight:600;font-variant-numeric:tabular-nums}
  /* resumen */
  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:0 0 14px}
  .panel h3{margin:0 0 2px;font-size:16px;font-weight:600}
  .panel p.sub{margin:0 0 14px;color:var(--muted);font-size:13px}
  .leyenda{display:flex;gap:16px;flex-wrap:wrap;margin:10px 0 0;font-size:13px}
  .leyenda span{display:flex;align-items:center;gap:6px;color:var(--muted)}
  .leyenda i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .dosdias{background:#eaf4ef}
  .chip{display:inline-block;background:var(--brand);color:#fff;border-radius:20px;
        padding:1px 8px;font-size:11px;margin-left:6px;font-weight:600}
  .hidden{display:none}
  @media print{
    @page{ size:letter portrait; margin:12mm; }
    *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    body{background:#fff;font-size:10pt}
    .wrap{max-width:none;padding:0}
    header.app,.prog,.navbar,.no-print,.tabs,.toolbar{display:none!important}
    .cbte{border:0;padding:0;page-break-inside:avoid}
    .cbte h3{font-size:13pt;margin:0 0 1px}
    .cbte .sub{font-size:8.5pt;margin:0 0 7px}
    .cbte .meta{font-size:8.5pt;gap:0 14px;margin:0 0 7px}
    .cbte .meta div{padding:1px 0}
    .cbte .big{font-size:12pt;padding:5px;margin:3px 0 7px}
    .cbte .alert{font-size:9pt;padding:6px;margin:0 0 7px}
    /* las dos tablas van lado a lado, como en la hoja de Excel */
    .tablas{display:flex;gap:12px;align-items:flex-start}
    .tablas table{flex:1;margin:0;page-break-inside:avoid}
    .cbte caption{font-size:8.5pt;padding:2px 0}
    .cbte th,.cbte td{padding:1.5px 5px;font-size:8.5pt}
    .cbte .notas{font-size:8.5pt;margin-top:8px}
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <header class="app">
    <div class="title" id="apptitle">Cierre de caja</div>
    <div class="who" id="who"></div>
  </header>
  <div class="prog" id="prog" aria-hidden="true"></div>
  <div id="screen"><div class="spin">Cargando…</div></div>
</div>
<div class="navbar no-print hidden" id="nav"></div>

<script>
/* ========================================================================== */
const API = "https://script.google.com/macros/s/AKfycbzs7ZkwOqA-V3a0y1w2o5aldj492dyChdppfL9_NOa0rdHD-Q7QPS_T8HiRXiKnRwk_Sw/exec";

let CFG = null;            // cajeros, cajas, monedas, minimos, billetes (del Sheet)
let TODAS = [];            // denominaciones de mayor a menor
let ADMIN = null;          // { pin, config, ... } cuando entra un admin

const DEN_DOL = [100,50,20,10,5,2,1];

const C = {                // estado del cierre en curso
  cajero:null, pin:null, caja:"", fecha:null, apertura:null, modoAdmin:false,
  bac:0, davibank:0, sinpes:0, dolares:0, dolaresDen:{}, retiros:0, retiroJustif:"",
  otrosDesc:"", otrosMonto:0, venta:null,
  billetes:{}, pesos:{}, notas:"", congelado:false
};

/* ============================== utilidades =============================== */
const $ = s => document.querySelector(s);
const screen = $("#screen"), nav = $("#nav");
const money = n => "₡" + Math.round(n||0).toLocaleString("es-CR");
const num = v => { const n = parseFloat(String(v).replace(/[^\d.-]/g,"")); return isNaN(n)?0:n; };
const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* --- montos: se escriben como ₡430 000 (espacio cada 3 dígitos) --- */
function fmtMonto(v){
  const d = String(v==null?"":v).replace(/\D/g,"");
  if(!d) return "";
  return "₡" + d.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
}
const mIn = n => (n===null||n===undefined||n===""||n===0) ? "" : fmtMonto(n);
function fmtMontoEl(el){
  const start = el.selectionStart;
  const antes = el.value.slice(0,start).replace(/\D/g,"").length;
  el.value = fmtMonto(el.value);
  let i=0, pos=el.value.length;
  if(antes===0) pos = el.value.length ? 1 : 0;
  else for(let k=0;k<el.value.length;k++){
    if(/\d/.test(el.value[k])){ i++; if(i===antes){ pos=k+1; break; } }
  }
  try{ el.setSelectionRange(pos,pos); }catch(e){}
}
/** Formatea todos los campos de monto de la pantalla actual. */
function fmtMontos(root){
  (root||document).querySelectorAll("input[data-money]").forEach(el=>{
    if(document.activeElement===el) fmtMontoEl(el); else el.value=fmtMonto(el.value);
  });
}

async function api(payload){
  const r = await fetch(API, {
    method: "POST", redirect: "follow",
    headers: { "Content-Type": "text/plain;charset=utf-8" },   // evita preflight CORS
    body: JSON.stringify(payload)
  });
  return r.json();
}
async function apiGet(accion, params){
  const q = new URLSearchParams(Object.assign({accion}, params||{}));
  const r = await fetch(API + "?" + q.toString(), { redirect:"follow" });
  return r.json();
}
function fmtFecha(s){ if(!s) return "—"; const d=new Date(String(s).slice(0,10)+"T00:00:00");
  return d.toLocaleDateString("es-CR",{weekday:"long",day:"numeric",month:"long"}); }
function fmtCorta(s){ if(!s) return ""; const d=new Date(String(s).slice(0,10)+"T00:00:00");
  return d.toLocaleDateString("es-CR"); }
function depositoDe(f){
  const p=String(f).slice(0,10).split("-");
  if(p.length<3) return String(f).slice(0,10);
  const d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2])), dow=d.getUTCDay();
  let suma;
  if(dow>=1&&dow<=4) suma=5-dow;     // lun-jue -> viernes
  else if(dow===0)   suma=1;         // domingo -> lunes
  else               suma=8-dow;     // vie/sab -> lunes
  d.setUTCDate(d.getUTCDate()+suma);
  const mm=("0"+(d.getUTCMonth()+1)).slice(-2), dd=("0"+d.getUTCDate()).slice(-2);
  return d.getUTCFullYear()+"-"+mm+"-"+dd;
}

/* ================================ arranque =============================== */
(async function init(){
  try{
    const r = await apiGet("config");
    if(!r.ok) throw new Error(r.error||"No se pudo cargar la configuración");
    CFG = r;
    C.fecha = r.hoy;
    TODAS = CFG.billetes.concat(Object.keys(CFG.monedas).map(Number)).sort((a,b)=>b-a);
    renderLogin();
  }catch(err){
    screen.innerHTML = `<div class="card"><h2 class="step">No se pudo conectar</h2>
      <p class="hint">Revisá la conexión a internet e intentá de nuevo.</p>
      <p class="err">${esc(err.message)}</p>
      <button class="btn-primary" style="width:100%" onclick="location.reload()">Reintentar</button></div>`;
  }
})();

/* ================================= LOGIN ================================= */
function renderLogin(){
  nav.classList.add("hidden"); $("#prog").innerHTML=""; $("#who").textContent="";
  $("#wrap").classList.remove("admin"); $("#apptitle").textContent="Cierre de caja";
  screen.innerHTML = `
    <div class="card">
      <h2 class="step">Ingresá tu cierre</h2>
      <p class="hint">Elegí tu nombre y digitá tu PIN.</p>
      <label class="fld"><span>Cajero(a)</span>
        <select id="l-cajero"><option value="">Seleccioná…</option>
          ${CFG.cajeros.map(n=>`<option>${esc(n)}</option>`).join("")}
        </select></label>
      <label class="fld"><span>PIN</span>
        <input id="l-pin" class="left" inputmode="numeric" type="password" placeholder="••••" autocomplete="off"></label>
      <p class="err hidden" id="l-err"></p>
      <button class="btn-primary" style="width:100%" id="l-go">Empezar</button>
      <button class="link" onclick="renderAdminLogin()">Entrar como administrador</button>
    </div>`;
  $("#l-go").onclick = doLogin;
  $("#l-pin").onkeydown = e => { if(e.key==="Enter") doLogin(); };
}
async function doLogin(){
  const nombre = $("#l-cajero").value, pin = $("#l-pin").value;
  const err = $("#l-err"), btn = $("#l-go");
  const fail = m => { err.textContent=m; err.classList.remove("hidden"); btn.disabled=false; btn.textContent="Empezar"; };
  if(!nombre) return fail("Seleccioná tu nombre.");
  if(!pin)    return fail("Digitá tu PIN.");
  btn.disabled=true; btn.textContent="Verificando…"; err.classList.add("hidden");
  try{
    const r = await api({accion:"verificarPin", cajero:nombre, pin:pin});
    if(!r.ok) return fail(r.error||"PIN incorrecto.");
    C.cajero=nombre; C.pin=pin; irA(0);
  }catch(e){ fail("Sin conexión. Intentá de nuevo."); }
}

/* ============================ FLUJO DEL CAJERO =========================== */
const PASOS=["fecha","apertura","electronicos","venta","conteo","prevista","resultado"];
let paso=0;
function irA(p){ paso=p; renderPaso(); }
function renderPaso(){
  $("#who").textContent = (C.modoAdmin?"Admin · ":"") + (C.cajero||"—") + (C.caja? " · "+C.caja : "");
  const prog=$("#prog"); prog.innerHTML="";
  PASOS.forEach((_,i)=>{ const s=document.createElement("span"); if(i<=paso)s.className="on"; prog.appendChild(s); });
  ({fecha:pFecha,apertura:pApertura,electronicos:pElectronicos,venta:pVenta,
    conteo:pConteo,prevista:pPrevista,resultado:()=>{}})[PASOS[paso]]();
}
function navBar(onNext,label="Continuar",canNext=true){
  nav.classList.remove("hidden");
  nav.innerHTML = `${paso>0?`<button class="btn-ghost" id="nv-b">Atrás</button>`:""}
                   <button class="btn-primary" id="nv-n" ${canNext?"":"disabled"}>${label}</button>`;
  const b=$("#nv-b"); if(b) b.onclick=()=>{ if(paso-1===2) sub=SUBS.length-1; irA(paso-1); };
  $("#nv-n").onclick=onNext;
}

function pFecha(){
  screen.innerHTML=`
    <div class="card">
      <h2 class="step">Fecha y caja</h2>
      <p class="hint">${C.modoAdmin?"Elegí el cajero, la fecha y la caja del cierre.":"Confirmá la fecha del cierre y tu caja."}</p>
      ${C.modoAdmin?`<label class="fld"><span>Cajero(a)</span>
        <select id="f-cajero"><option value="">Seleccioná…</option>
          ${CFG.cajeros.map(n=>`<option ${C.cajero===n?"selected":""}>${esc(n)}</option>`).join("")}
        </select></label>`:""}
      <label class="fld"><span>Fecha del cierre</span>
        <input id="f-fecha" type="date" value="${C.fecha}"></label>
      <label class="fld"><span>Caja</span>
        <select id="f-caja"><option value="">Seleccioná…</option>
          ${CFG.cajas.map(c=>`<option ${C.caja===c?"selected":""}>${esc(c)}</option>`).join("")}
        </select></label>
      <div class="note" id="f-dep">Este cierre entra en el depósito del <b>${fmtFecha(depositoDe(C.fecha))}</b>.</div>
    </div>`;
  const listo=()=>!!C.caja && (!C.modoAdmin || !!C.cajero);
  const ok=()=>navBar(()=>irA(1),"Continuar",listo());
  $("#f-fecha").onchange=e=>{ C.fecha=e.target.value;
    $("#f-dep").innerHTML=`Este cierre entra en el depósito del <b>${fmtFecha(depositoDe(C.fecha))}</b>.`; };
  $("#f-caja").onchange=e=>{ C.caja=e.target.value; ok(); };
  if(C.modoAdmin) $("#f-cajero").onchange=e=>{ C.cajero=e.target.value; renderPaso(); };
  ok();
}

function pApertura(){
  screen.innerHTML=`
    <div class="card">
      <h2 class="step">Monto de apertura</h2>
      <p class="hint">¿Con cuánto efectivo abriste la caja hoy?</p>
      <label class="fld"><span>Apertura (colones)</span>
        <input id="a-ap" data-money inputmode="numeric" value="${mIn(C.apertura)}" placeholder="₡0"></label>
    </div>`;
  const ok=()=>navBar(()=>irA(2),"Continuar",C.apertura!==null&&C.apertura!=="");
  $("#a-ap").oninput=e=>{ fmtMontoEl(e.target); C.apertura=num(e.target.value); ok(); };
  ok();
}

/* Los movimientos se piden UNO POR PANTALLA para no saturar al cajero. */
const SUBS=[
  {k:"bac",      t:"Datáfono BAC",       h:"Monto del cierre del datáfono BAC."},
  {k:"davibank", t:"Datáfono Davibank",  h:"Monto del cierre del datáfono Davibank."},
  {k:"sinpes",   t:"SINPE Móvil",        h:"Total recibido por SINPE Móvil."},
  {k:"dolares",  t:"Dólares recibidos",  h:"Cantidad en dólares. Dejalo vacío si no hubo.", dolar:true},
  {k:"retiros",  t:"Retiros de efectivo",h:"Dinero que se sacó de la caja. Dejalo vacío si no hubo.", just:true},
  {k:"otros",    t:"Otros ingresos",     h:"Efectivo que no viene de la venta, por ejemplo la venta de aceite quemado. Dejalo vacío si no hubo.", otros:true}
];
let sub=0;

function pElectronicos(){
  const S=SUBS[sub], ultimo=(sub===SUBS.length-1);
  const paso_t=`Paso ${sub+1} de ${SUBS.length}`;
  let campos;
  if(S.otros){
    campos=`
      <label class="fld"><span>¿De qué es?</span>
        <input id="e-odesc" value="${esc(C.otrosDesc)}" placeholder="Descripción"></label>
      <label class="fld"><span>Monto</span>
        <input id="e-omonto" data-money inputmode="numeric" value="${mIn(C.otrosMonto)}" placeholder="₡0"></label>`;
  } else if(S.dolar){
    campos=`<label class="fld"><span>Total en dólares ($)</span>
        <input id="e-val" inputmode="numeric" value="${C.dolares||""}" placeholder="0"></label>
      <div id="e-dd" class="${C.dolares>0?"":"hidden"}">
        <div class="subhead">Detalle de billetes</div>
        ${DEN_DOL.map(d=>`<div class="denom-row"><span class="dn">$${d}</span>
          <input inputmode="numeric" data-dol="${d}" value="${C.dolaresDen[d]||""}" placeholder="0"></div>`).join("")}
        <p class="hint" id="e-dsum" style="margin-top:10px"></p>
      </div>`;
  } else {
    campos=`<label class="fld"><span>Monto</span>
        <input id="e-val" data-money inputmode="numeric" value="${mIn(C[S.k])}" placeholder="₡0"></label>`;
  }
  screen.innerHTML=`
    <div class="card">
      <p class="hint" style="margin:0 0 4px">${paso_t}</p>
      <h2 class="step">${S.t}</h2>
      <p class="hint">${S.h}</p>
      ${campos}
      ${S.just?`<label class="fld hidden" id="e-just-wrap"><span>Justificación del retiro (obligatoria)</span>
        <textarea id="e-just" placeholder="¿Por qué se hizo el retiro?">${esc(C.retiroJustif)}</textarea></label>`:""}
    </div>`;

  const avanzar=()=>{ if(ultimo){ sub=0; irA(3); } else { sub++; renderPaso(); } };
  const atras=()=>{ if(sub===0){ irA(1); } else { sub--; renderPaso(); } };

  const sync=()=>{
    fmtMontos(screen);
    let ok = true;
    if(S.otros){
      C.otrosDesc=$("#e-odesc").value.trim(); C.otrosMonto=num($("#e-omonto").value);
    } else if(S.dolar){
      C.dolares=num($("#e-val").value);
      DEN_DOL.forEach(d=>{ const el=screen.querySelector(`input[data-dol="${d}"]`);
        if(el) C.dolaresDen[d]=Math.round(num(el.value)); });
      if(!(C.dolares>0)){ C.dolaresDen={}; }   // sin dólares: se borra el detalle
      const suma=DEN_DOL.reduce((s,d)=>s+(C.dolaresDen[d]||0)*d,0);
      $("#e-dd").classList.toggle("hidden", !(C.dolares>0));
      if(C.dolares>0){
        const igual = suma===C.dolares;
        $("#e-dsum").textContent = igual
          ? `Detalle completo: $${suma}`
          : `Detallado $${suma} de $${C.dolares}. Ajustá las cantidades.`;
        $("#e-dsum").style.color = igual ? "var(--brand-ink)" : "var(--danger-ink)";
        ok = igual;
      }
    } else {
      C[S.k]=num($("#e-val").value);
      if(S.just){
        C.retiroJustif=$("#e-just").value.trim();
        $("#e-just-wrap").classList.toggle("hidden", !(C.retiros>0));
        ok = !(C.retiros>0 && !C.retiroJustif);
      }
    }
    nav.classList.remove("hidden");
    nav.innerHTML=`<button class="btn-ghost" id="nv-b">Atrás</button>
                   <button class="btn-primary" id="nv-n" ${ok?"":"disabled"}>Continuar</button>`;
    $("#nv-b").onclick=atras; $("#nv-n").onclick=avanzar;
  };
  screen.querySelectorAll("input,textarea").forEach(el=>el.oninput=sync);
  sync();
}

/** Agrupa los cierres por fecha. Si dos cajeros trabajaron el mismo día
 *  (mañana y tarde), sus ventas se suman en una sola fila. */
function porDia(){
  const m={};
  A.cierres.forEach(c=>{
    const f=String(c.fecha).slice(0,10);
    if(!m[f]) m[f]={fecha:f,cajeros:[],venta:0,tarjetas:0,sinpes:0,dolares:0,
                    efectivoVenta:0,entrega:0,descuadre:0};
    const o=m[f], tc=num(c.tipoCambio)||490;
    if(o.cajeros.indexOf(c.cajero)<0) o.cajeros.push(c.cajero);
    o.venta     += num(c.venta);
    o.tarjetas  += num(c.bac)+num(c.davibank);
    o.sinpes    += num(c.sinpes);
    o.dolares   += num(c.dolares)*tc;
    o.efectivoVenta += num(c.venta)-num(c.bac)-num(c.davibank)-num(c.sinpes)-num(c.dolares)*tc;
    o.entrega   += num(c.entrega);
    o.descuadre += num(c.descuadre);
  });
  return Object.keys(m).sort().map(k=>m[k]);
}

function porCajero(){
  const m={};
  A.cierres.forEach(c=>{
    const k=String(c.cajero||"—");
    if(!m[k]) m[k]={cajero:k,cierres:0,venta:0,descuadre:0};
    m[k].cierres++; m[k].venta+=num(c.venta); m[k].descuadre+=num(c.descuadre);
  });
  return Object.keys(m).map(k=>m[k]).sort((a,b)=>b.venta-a.venta);
}

/** Montos cortos para que quepan sobre las barras: ₡1,1 M / ₡551 k */
function corto(n){
  n=Math.round(n||0);
  if(Math.abs(n)>=1000000) return "₡"+(n/1000000).toFixed(1).replace(".",",")+" M";
  if(Math.abs(n)>=1000)    return "₡"+Math.round(n/1000)+" k";
  return "₡"+n;
}
function diaCorto(f){
  const p=String(f).slice(0,10).split("-");
  const d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));
  return ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d.getUTCDay()]+" "+(+p[2]);
}

/** Gráfico de barras verticales, dibujado a mano (sin librerías). */
function svgBarras(items){
  if(!items.length) return `<p class="hint">Sin datos en este rango.</p>`;
  const W=760,H=240,mt=26,mb=46,ml=6,mr=6;
  const max=Math.max.apply(null,items.map(i=>i.valor).concat([1]));
  const paso=(W-ml-mr)/items.length, bw=Math.min(64,paso*0.6);
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img" style="width:100%;height:auto">`;
  s+=`<line x1="${ml}" y1="${H-mb}" x2="${W-mr}" y2="${H-mb}" stroke="#d9d6ca"/>`;
  items.forEach((it,i)=>{
    const h=Math.max(2,Math.round((H-mt-mb)*(it.valor/max)));
    const x=ml+paso*i+(paso-bw)/2, y=H-mb-h;
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bw.toFixed(1)}" height="${h}" rx="3" fill="#1d6e56"/>`;
    s+=`<text x="${(x+bw/2).toFixed(1)}" y="${y-7}" text-anchor="middle" font-size="12"
         font-weight="600" fill="#0f5040">${corto(it.valor)}</text>`;
    s+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-mb+17}" text-anchor="middle" font-size="12"
         fill="#26251f">${esc(it.label)}</text>`;
    if(it.sub) s+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-mb+32}" text-anchor="middle"
         font-size="11" fill="#6b6a62">${esc(it.sub)}</text>`;
  });
  return s+`</svg>`;
}

/** Barra apilada horizontal para la composición de la venta. */
function svgApilada(partes){
  const total=partes.reduce((s,p)=>s+Math.max(0,p.valor),0);
  if(!total) return `<p class="hint">Sin datos en este rango.</p>`;
  const W=760,H=38; let x=0,s=`<svg viewBox="0 0 ${W} ${H}" role="img" style="width:100%;height:auto">`;
  partes.forEach(p=>{
    const w=(W*Math.max(0,p.valor))/total; if(w<=0) return;
    s+=`<rect x="${x.toFixed(1)}" y="0" width="${w.toFixed(1)}" height="${H}" fill="${p.color}"/>`;
    if(w>58) s+=`<text x="${(x+w/2).toFixed(1)}" y="${H/2+4}" text-anchor="middle"
                  font-size="12" font-weight="600" fill="#fff">${Math.round(p.valor/total*100)}%</text>`;
    x+=w;
  });
  return s+`</svg>`;
}

function adminPintarResumen(body){

  const dias2=D.filter(d=>d.cajeros.length>1).length;

  const barras=svgBarras(D.map(d=>({

    {label:"SINPE",     valor:t("sinpes"),        color:"#c9822b"},
    {label:"Dólares",   valor:t("dolares"),       color:"#7a6a9b"}
  ];

  body.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="k">Venta del periodo</div><div class="v">${money(t("venta"))}</div></div>
      <div class="kpi"><div class="k">Promedio por día</div><div class="v">${money(t("venta")/D.length)}</div></div>
      <div class="kpi"><div class="k">Mejor día</div><div class="v">${money(mejor.venta)}</div>
        <div class="k">${diaCorto(mejor.fecha)}</div></div>
      <div class="kpi"><div class="k">Días con 2+ cajeros</div><div class="v">${dias2}</div></div>
      <div class="kpi"><div class="k">Total a depositar</div><div class="v">${money(t("entrega"))}</div></div>
    </div>

    <div class="panel">
      <h3>Venta por día</h3>
      <p class="sub">Cuando trabaja más de un cajero en el mismo día, las ventas se suman.</p>
      ${barras}
    </div>

    <div class="panel">
      <h3>Cómo pagaron</h3>
      <p class="sub">Composición de ${money(t("venta"))} en ventas del periodo.</p>
      ${svgApilada(partes)}
      <div class="leyenda">
        ${partes.map(p=>`<span><i style="background:${p.color}"></i>${p.label}:
          ${money(p.valor)} (${Math.round(p.valor/totalV*100)}%)</span>`).join("")}
      </div>
    </div>

    <div class="panel">
      <h3>Detalle por día</h3>
      <p class="sub">Los días con más de un cajero salen resaltados.</p>
      <div class="xls"><table class="grid">
        <thead><tr><th>Fecha</th><th>Cajeros</th><th>Venta total</th><th>Efectivo</th>
          <th>Tarjetas</th><th>SINPE</th><th>Dólares</th><th>Depositado</th><th>Descuadre</th></tr></thead>
        <tbody>${D.map(d=>`<tr class="${d.cajeros.length>1?"dosdias":""}">
          <td class="txt">${fmtCorta(d.fecha)}</td>
          <td class="txt">${esc(d.cajeros.join(", "))}${d.cajeros.length>1?`<span class="chip">${d.cajeros.length}</span>`:""}</td>
          <td><b>${money(d.venta)}</b></td>
          <td>${money(d.efectivoVenta)}</td>
          <td>${money(d.tarjetas)}</td>
          <td>${d.sinpes?money(d.sinpes):"—"}</td>
          <td>${d.dolares?money(d.dolares):"—"}</td>
          <td>${money(d.entrega)}</td>
          <td class="${d.descuadre<0?"neg":(d.descuadre>0?"pos":"")}">${d.descuadre===0?"—":money(d.descuadre)}</td>

        <tfoot><tr style="background:#f1efe8;font-weight:600">
          <td class="txt">TOTAL</td><td class="txt">${D.length} días</td>
          <td>${money(t("venta"))}</td><td>${money(t("efectivoVenta"))}</td>
          <td>${money(t("tarjetas"))}</td><td>${money(t("sinpes"))}</td>
          <td>${money(t("dolares"))}</td><td>${money(t("entrega"))}</td>
          <td>${money(t("descuadre"))}</td></tr></tfoot>
      </table></div>
    </div>

      <h3>Por cajero</h3>
      <p class="sub">Ventas acumuladas y descuadre del periodo.</p>
      ${svgBarras(CJ.map(c=>({valor:c.venta,label:String(c.cajero).split(" ")[0],sub:c.cierres+" cierres"})))}

        <thead><tr><th>Cajero</th><th>Cierres</th><th>Venta</th><th>Promedio</th><th>Descuadre</th></tr></thead>
        <tbody>${CJ.map(c=>`<tr>

          <td>${money(c.venta)}</td><td>${money(c.venta/c.cierres)}</td>
          <td class="${c.descuadre<0?"neg":(c.descuadre>0?"pos":"")}">${c.descuadre===0?"—":money(c.descuadre)}</td>

      </table></div>

}

function adminPintarOtros(body){
  body.innerHTML=`
    <div class="card" style="max-width:520px">
      <h2 class="step">Registrar otro ingreso</h2>
      <p class="hint">Efectivo que no viene de una caja. Entra al depósito directamente.</p>
      <label class="fld"><span>Fecha</span><input type="date" id="o-fecha" value="${A.hasta}"></label>
      <label class="fld"><span>¿De qué es?</span><input id="o-desc" placeholder="Ej. venta de aceite quemado"></label>
      <label class="fld"><span>Monto</span><input id="o-monto" data-money inputmode="numeric" placeholder="₡0" oninput="fmtMontoEl(this)"></label>
      <p class="err hidden" id="o-err"></p>
      <button class="btn-primary" style="width:100%" id="o-go">Guardar</button>
    </div>
    ${A.otros.length?`<div class="xls" style="margin-top:14px"><table class="grid">
      <thead><tr><th>Fecha</th><th>Depósito</th><th>Descripción</th><th>Monto</th><th>Origen</th><th>Registró</th></tr></thead>
      <tbody>${A.otros.map(o=>`<tr>
        <td class="txt">${fmtCorta(o.fecha)}</td><td class="txt">${fmtCorta(o.deposito)}</td>
        <td class="txt">${esc(o.descripcion)}</td><td>${money(num(o.monto))}</td>
        <td class="txt">${esc(o.origen)}</td><td class="txt">${esc(o.registradoPor)}</td></tr>`).join("")}</tbody>
    </table></div>`:`<p class="hint">Sin otros ingresos en este rango.</p>`}`;
  $("#o-go").onclick=async()=>{
    const err=$("#o-err"), btn=$("#o-go");
    const desc=$("#o-desc").value.trim(), monto=num($("#o-monto").value);
    if(!desc||!monto){ err.textContent="Poné la descripción y el monto."; err.classList.remove("hidden"); return; }
    btn.disabled=true; btn.textContent="Guardando…"; err.classList.add("hidden");
    try{
      const r=await api({accion:"otroIngreso", pin:ADMIN.pin, fecha:$("#o-fecha").value, descripcion:desc, monto});
      if(!r.ok){ err.textContent=r.error; err.classList.remove("hidden"); btn.disabled=false; btn.textContent="Guardar"; return; }
      adminCargar();
    }catch(e){ err.textContent="Sin conexión."; err.classList.remove("hidden"); btn.disabled=false; btn.textContent="Guardar"; }
  };
}

/* ---- Exportar a Excel: lo genera el servidor, una hoja por depósito ----- */
async function exportarExcel(){
  const btn=$("#a-excel"); if(!btn) return;
  const txt=btn.textContent; btn.disabled=true; btn.textContent="Generando…";
  try{
    const r=await api({accion:"exportar", pin:ADMIN.pin, desde:A.desde, hasta:A.hasta});
    if(!r.ok){ alert(r.error||"No se pudo exportar."); return; }
    const bin=atob(r.archivo), bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes],
      {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=r.nombre||"depositos.xlsx";
    a.click(); URL.revokeObjectURL(a.href);
  }catch(e){ alert("Sin conexión o el archivo tardó demasiado."); }
  finally{ btn.disabled=false; btn.textContent=txt; }
}
